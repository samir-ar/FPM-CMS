<body data-spy="scroll" data-target="#scroll-menu" data-offset="100" id="index-three">
    <div class="comming-soon">
        <div class="container">
            <div class="row">
                <div class="col-sm-4">
                    <a class="navbar-brand" href="#"><img src="img/logo.png" alt=""></a>
                </div>
                <div class="col-sm-4"><img class="coming-soon-banner" src="img/comming-soon.png" alt=""></div>
                <div class="col-sm-4"><a class="coming-soon-message" href="#"><i class="fa fa-envelope-open" aria-hidden="true"></i></a></div>
            </div>

            <div class="row">
                <h1 class="coming-soon-title"></h1>
            </div>

            <div class="row">
                <div class="col-sm-12">
                    <div id="countdown">
                        <div class="cd-box">
                            <p class="numbers" id="day">00</p>
                            <p class="strings timeRefDays">Days</p>
                        </div>
                        <div class="cd-box">
                            <p class="numbers" id="hour">00</p>
                            <p class="strings timeRefHours">Hours</p>
                        </div>
                        <div class="cd-box">
                            <p class="numbers" id="month">00</p>
                            <p class="strings timeRefMinutes">Minutes</p>
                        </div>
                        <div class="cd-box">
                            <p class="numbers" id="second">00</p>
                            <p class="strings timeRefSeconds">Seconds</p>
                        </div>
                    </div>
                    <!-- end div#countdown -->
                </div>
            </div>
        </div>
        <div class="video-background">
            <div class="video-foreground">
                <iframe src="https://www.youtube.com/embed/W0LHTWG-UmQ?controls=0&showinfo=0&rel=0&autoplay=1&loop=1&playlist=W0LHTWG-UmQ" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>




    <!-- Scripts -->
    <script src="js/jquery-1.12.4.min.js"></script>
